services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "1"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic robotics.samples.success --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic robotics.samples.failure --partitions 1 --replication-factor 1

  producer:
    profiles: ["apps"]
    image: boaz-data-pipeline:latest
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "-m", "pipeline.producer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAX_SAMPLES: "${MAX_SAMPLES:-10}"
      PRODUCER_INTERVAL_SECONDS: "${PRODUCER_INTERVAL_SECONDS:-5}"
      PLAYBACK_TIMEOUT_SECONDS: "${PLAYBACK_TIMEOUT_SECONDS:-900}"
      KAFKA_CONNECT_TIMEOUT_SECONDS: "${KAFKA_CONNECT_TIMEOUT_SECONDS:-60}"
      VIDEO_SKIP: "${VIDEO_SKIP:-5}"
      MUJOCO_GL: "${MUJOCO_GL:-osmesa}"
    volumes:
      - ${DATASET_HOST_DIR:-./data/playback_data}:/workspace/data/playback_data:ro
      - ./pipeline_output:/workspace/pipeline_output

  success-consumer:
    profiles: ["apps"]
    image: boaz-data-pipeline:latest
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "-m", "pipeline.consumer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLASSIFICATION: success
      TOPIC: robotics.samples.success
      KAFKA_CONNECT_TIMEOUT_SECONDS: "${KAFKA_CONNECT_TIMEOUT_SECONDS:-60}"
    volumes:
      - ./pipeline_output:/workspace/pipeline_output

  failure-consumer:
    profiles: ["apps"]
    image: boaz-data-pipeline:latest
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "-m", "pipeline.consumer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLASSIFICATION: failure
      TOPIC: robotics.samples.failure
      KAFKA_CONNECT_TIMEOUT_SECONDS: "${KAFKA_CONNECT_TIMEOUT_SECONDS:-60}"
    volumes:
      - ./pipeline_output:/workspace/pipeline_output

  monitor:
    profiles: ["apps"]
    image: boaz-data-pipeline:latest
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    command: ["python", "-m", "monitor.app"]
    environment:
      OUTPUT_DIR: /workspace/pipeline_output
      MONITOR_HOST: 0.0.0.0
      MONITOR_PORT: "8000"
    ports:
      - "${MONITOR_PORT:-8000}:8000"
    volumes:
      - ./pipeline_output:/workspace/pipeline_output
